<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Link Talk</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.app { padding:20px; }

.status {
  background:green;
  padding:8px 14px;
  border-radius:6px;
  display:inline-block;
  margin-bottom:15px;
}

#vu {
  width:260px;
  height:20px;
  background:#222;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

#vu-bar {
  height:100%;
  width:0%;
  background:#00ff88;
}

#ptt {
  width:220px;
  height:220px;
  border-radius:50%;
  background:#1e90ff;
  border:none;
  color:#fff;
  font-size:18px;
}

#audios { display:none; }
</style>
</head>

<body>

<div class="app">
<h1>Z-Link Talk</h1>

<div id="status" class="status">Iniciando...</div>

<div id="vu"><div id="vu-bar"></div></div>

<button id="ptt">SEGURE PARA FALAR</button>
<p>Ou pressione F7</p>

<div id="audios"></div>
</div>

<script>

// =========================
// VARIÁVEIS
// =========================
const ws = new WebSocket("wss://z-link-talk.onrender.com");

const peers = {};
const audioElements = {};

let localStream = null;
let myId = null;
let keyPressed = false;
let isTalking = false;

const statusEl = document.getElementById("status");
const vuBar = document.getElementById("vu-bar");
const ptt = document.getElementById("ptt");
const audiosDiv = document.getElementById("audios");

// =========================
// AUDIO CONTEXT
// =========================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

document.body.addEventListener("click", () => {
  audioCtx.resume();
});

// =========================
// INICIALIZA MICROFONE
// =========================
function initMic(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    localStream = stream;

    const track = stream.getAudioTracks()[0];
    track.enabled = false;

    // VU TX
    const analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function vuTX(){
      analyser.getByteFrequencyData(data);
      let vol = data.reduce((a,b)=>a+b)/data.length;

      if (isTalking) {
        vuBar.style.width = (vol/2)+"%";
      }

      requestAnimationFrame(vuTX);
    }

    vuTX();

  }).catch(err=>{
    alert("Erro no microfone: " + err);
  });
}

initMic();

// =========================
// WEBSOCKET
// =========================
ws.onopen = () => {
  console.log("WS conectado");
  statusEl.innerText = "Conectado ao servidor";
};

ws.onerror = (e) => {
  console.error("Erro WS", e);
  statusEl.innerText = "Erro conexão";
};

ws.onclose = () => {
  statusEl.innerText = "Desconectado";
};

// =========================
// CRIAR PEER
// =========================
function createPeer(id){

  if (peers[id]) return peers[id];
  if (!localStream) return;

  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.ontrack = (e)=>{
    let audio = audioElements[id];

    if (!audio) {
      audio = document.createElement("audio");
      audio.autoplay = true;
      audio.playsInline = true;
      audiosDiv.appendChild(audio);
      audioElements[id] = audio;
    }

    audio.srcObject = e.streams[0];

    // VU RX
    const analyser = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(e.streams[0]);
    source.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function vuRX(){
      analyser.getByteFrequencyData(data);
      let vol = data.reduce((a,b)=>a+b)/data.length;

      if (!isTalking) {
        vuBar.style.width = (vol/2)+"%";
      }

      requestAnimationFrame(vuRX);
    }

    vuRX();
  };

  pc.onicecandidate = (e)=>{
    if(e.candidate){
      ws.send(JSON.stringify({
        type:"ice",
        to:id,
        candidate:e.candidate
      }));
    }
  };

  peers[id] = pc;
  return pc;
}

// =========================
// MENSAGENS
// =========================
ws.onmessage = async (msg)=>{
  const data = JSON.parse(msg.data);

  if(data.type==="init"){
    myId = data.id;

    data.clients.forEach(async id=>{
      if(id!==myId && localStream){
        const pc = createPeer(id);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        ws.send(JSON.stringify({
          type:"offer",
          to:id,
          offer
        }));
      }
    });
  }

  if(data.type==="new_peer" && localStream){
    const pc = createPeer(data.id);

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    ws.send(JSON.stringify({
      type:"offer",
      to:data.id,
      offer
    }));
  }

  if(data.type==="offer"){
    const pc = createPeer(data.from);

    await pc.setRemoteDescription(data.offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    ws.send(JSON.stringify({
      type:"answer",
      to:data.from,
      answer
    }));
  }

  if(data.type==="answer"){
    if (peers[data.from]) {
      await peers[data.from].setRemoteDescription(data.answer);
    }
  }

  if(data.type==="ice"){
    if (peers[data.from]) {
      try {
        await peers[data.from].addIceCandidate(data.candidate);
      } catch {}
    }
  }
};

// =========================
// PTT
// =========================
function talk(on){
  if (!localStream) return;

  isTalking = on;

  localStream.getAudioTracks()[0].enabled = on;

  statusEl.innerText = on ? "Transmitindo..." : "Escutando";
}

ptt.onmousedown = ()=>talk(true);
ptt.onmouseup = ()=>talk(false);

ptt.addEventListener("touchstart", e=>{
  e.preventDefault();
  talk(true);
});

ptt.addEventListener("touchend", e=>{
  e.preventDefault();
  talk(false);
});

document.addEventListener("keydown", e=>{
  if(e.key==="F7" && !keyPressed){
    keyPressed = true;
    talk(true);
  }
});

document.addEventListener("keyup", e=>{
  if(e.key==="F7"){
    keyPressed = false;
    talk(false);
  }
});

</script>

</body>
</html>
