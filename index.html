<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Link Talk | Diniz-RF</title>
    <style>
        :root {
            --body-bg: #050505;
            --radio-base: #1c1f24;
            --radio-border: #2a2e35;
            --display-bg: #030a0e;
            --glow-cyan: #00f2ff;
            --glow-red: #ff3c3c;
            --glow-green: #3cfb3c;
            --metal-shine: rgba(255,255,255,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background-color: var(--body-bg);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Estrutura Externa do Rádio */
        .radio-chassis {
            position: relative;
            width: 360px;
            height: 680px;
            background: linear-gradient(145deg, #23272d, #14171a);
            border-radius: 40px;
            border: 4px solid #111;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 2px 10px var(--metal-shine);
            display: flex;
            flex-direction: column;
            padding: 20px;
            user-select: none;
        }

        /* Detalhes de Hardware */
        .antenna {
            position: absolute;
            top: -60px; right: 50px;
            width: 35px; height: 80px;
            background: linear-gradient(to right, #111, #222, #111);
            border-radius: 8px 8px 0 0;
            z-index: -1;
        }
        .knob {
            position: absolute;
            top: -35px; left: 60px;
            width: 50px; height: 40px;
            background: linear-gradient(to right, #111, #333, #111);
            border-radius: 10px 10px 0 0;
            z-index: -1;
            border-top: 2px solid #ff3c3c;
        }

        .screw {
            position: absolute;
            width: 12px; height: 12px;
            background: radial-gradient(circle, #444, #111);
            border-radius: 50%;
            box-shadow: inset 0 1px 2px #fff3;
        }
        .s-tl { top: 15px; left: 15px; } .s-tr { top: 15px; right: 15px; }
        .s-bl { bottom: 15px; left: 15px; } .s-br { bottom: 15px; right: 15px; }

        .dev-header {
            text-align: center;
            font-size: 10px;
            color: #555;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* Painel do Display - CENTRALIZAÇÃO APLICADA */
        .display-area {
            background: #000;
            border: 8px solid #222;
            border-radius: 15px;
            padding: 25px 15px;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centraliza horizontalmente */
            justify-content: center; /* Equilibra verticalmente */
            text-align: center;
        }

        /* Overlay de brilho da tela */
        .display-area::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0.05) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 1;
        }

        /* AJUSTES DE HIERARQUIA VISUAL */
        #brand { 
            font-size: 34px; /* Maior destaque */
            font-weight: 800; 
            color: var(--glow-cyan); 
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.6); 
            margin: 0;
            letter-spacing: 1px;
            z-index: 2;
        }

        #status { 
            font-size: 16px; /* Tamanho Médio */
            margin: 10px 0; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 600;
            z-index: 2;
        }

        #peer-count { 
            font-size: 11px; /* Tamanho Menor */
            color: #4a5568; 
            letter-spacing: 1px;
            font-weight: bold;
            z-index: 2;
        }

        /* Cores dinâmicas de Status */
        .status-tx #status { color: var(--glow-red); text-shadow: 0 0 10px var(--glow-red); }
        .status-rx #status { color: var(--glow-green); text-shadow: 0 0 10px var(--glow-green); }

        /* VU Meter */
        .vu-container { margin-top: 20px; width: 100%; z-index: 2; }
        .vu-scale { display: flex; justify-content: space-between; font-size: 8px; color: #333; margin-bottom: 5px; padding: 0 5px; }
        canvas#vu-meter {
            width: 100%; height: 12px;
            background: #0a0a0a;
            border-radius: 2px;
        }

        /* Botão PTT */
        .ptt-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #ptt-btn {
            width: 220px; height: 220px;
            border-radius: 50%;
            border: 10px solid #111;
            background: radial-gradient(circle at 30% 30%, #3a3f46, #1a1d21);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1);
            transition: transform 0.1s;
            outline: none;
            touch-action: none;
        }

        #ptt-btn::after {
            content: ""; position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        #ptt-btn.active { transform: scale(0.96); }
        #ptt-btn.active::after { border-color: var(--glow-red); box-shadow: 0 0 25px var(--glow-red); }
        #ptt-btn.receiving::after { border-color: var(--glow-green); box-shadow: 0 0 25px var(--glow-green); }

        .ptt-label-main { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .ptt-label-sub { font-size: 10px; color: #666; letter-spacing: 1px; margin-top: 5px; text-transform: uppercase; }

        /* Grade do Alto-falante */
        .speaker-grill {
            height: 100px; width: 100%;
            background: radial-gradient(#000 25%, transparent 26%);
            background-size: 6px 6px;
            background-color: #16191d;
            border-radius: 20px;
            border: 2px solid #111;
            margin-top: 20px;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }

        #audio-container { display: none; }
    </style>
</head>
<body>

    <div class="radio-chassis">
        <div class="antenna"></div>
        <div class="knob"></div>
        
        <div class="screw s-tl"></div>
        <div class="screw s-tr"></div>
        <div class="screw s-bl"></div>
        <div class="screw s-br"></div>

        <div class="dev-header">Desenvolvido por Diniz-RF</div>

        <div class="display-area" id="display-wrapper">
            <h1 id="brand">Z-Link Talk</h1>
            <div id="status">CONECTANDO...</div>
            <div id="peer-count">BUSCANDO USUÁRIOS...</div>
            
            <div class="vu-container">
                <div class="vu-scale">
                    <span>1</span><span>3</span><span>5</span><span>7</span><span>9</span><span>11</span><span>13</span><span>MAX</span>
                </div>
                <canvas id="vu-meter" width="300" height="12"></canvas>
            </div>
        </div>

        <div class="ptt-section">
            <button id="ptt-btn">
                <div class="ptt-label-main">PTT</div>
                <div class="ptt-label-sub" id="ptt-hint">Pressione e fale</div>
            </button>
        </div>

        <div class="speaker-grill"></div>
    </div>

    <div id="audio-container"></div>

    <script>
        // --- LÓGICA DE SISTEMA (INTACTA) ---
        const WS_URL = "wss://z-link-talk.onrender.com";
        const AUDIO_BITRATE = 32;
        const SUBTONE_START_FREQ = 18500;
        const SUBTONE_END_FREQ = 17500;
        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        const pttBtn = document.getElementById('ptt-btn');
        const statusEl = document.getElementById('status');
        const displayWrapper = document.getElementById('display-wrapper');
        const canvasVU = document.getElementById('vu-meter');
        const ctxVU = canvasVU.getContext('2d');
        const peerCountEl = document.getElementById('peer-count');
        const audioContainer = document.getElementById('audio-container');
        const pttHint = document.getElementById('ptt-hint');

        let ws, myId = null, localStream, audioCtx, txAnalyser, rxAnalyser;
        let peers = {}, isTransmitting = false, pttPressed = false, rxCount = 0;
        let isF7Pressed = false;

        window.addEventListener('load', async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1 }
                });
                localStream.getAudioTracks()[0].enabled = false;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                txAnalyser = audioCtx.createAnalyser();
                rxAnalyser = audioCtx.createAnalyser();
                txAnalyser.fftSize = 256;
                rxAnalyser.fftSize = 256;
                const source = audioCtx.createMediaStreamSource(localStream);
                source.connect(txAnalyser);
                startVUMeter();
                connectWebSocket();
            } catch (err) {
                statusEl.innerText = "ERRO DE MIC";
                displayWrapper.className = "display-area status-tx";
            }
        });

        function connectWebSocket() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => { 
                statusEl.innerText = "Canal Livre"; 
                displayWrapper.className = "display-area"; 
            };
            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                const senderId = data.from || data.id;
                switch (data.type) {
                    case "init":
                        myId = data.id;
                        data.clients.forEach(clientId => { if (clientId !== myId) createPeerConnection(clientId, true); });
                        updatePeerCount(data.clients.length);
                        break;
                    case "new_peer":
                        updatePeerCount(Object.keys(peers).length + 2);
                        break;
                    case "offer":
                        if (!peers[senderId]) await createPeerConnection(senderId, false);
                        await peers[senderId].pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                        const answer = await peers[senderId].pc.createAnswer();
                        answer.sdp = setAudioBitrate(answer.sdp, AUDIO_BITRATE);
                        await peers[senderId].pc.setLocalDescription(answer);
                        ws.send(JSON.stringify({ type: "answer", to: senderId, answer: peers[senderId].pc.localDescription }));
                        break;
                    case "answer":
                        if (peers[senderId]) await peers[senderId].pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                        break;
                    case "ice_candidate":
                        if (peers[senderId]) await peers[senderId].pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                        break;
                    case "start_tx": handleRemoteTX(true, senderId); break;
                    case "stop_tx": handleRemoteTX(false, senderId); break;
                    case "peer_left":
                        if (peers[data.id]) {
                            if (peers[data.id].audioEl) peers[data.id].audioEl.remove();
                            peers[data.id].pc.close();
                            delete peers[data.id];
                        }
                        updatePeerCount(Object.keys(peers).length + 1);
                        break;
                }
            };
            ws.onclose = () => { 
                statusEl.innerText = "Desconectado"; 
                setTimeout(connectWebSocket, 3000); 
            };
        }

        async function createPeerConnection(peerId, isInitiator) {
            const pc = new RTCPeerConnection(rtcConfig);
            peers[peerId] = { pc, audioEl: null };
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.onicecandidate = (e) => { if (e.candidate) ws.send(JSON.stringify({ type: "ice_candidate", to: peerId, candidate: e.candidate })); };
            pc.ontrack = (e) => {
                if (!peers[peerId].audioEl) {
                    const audio = document.createElement('audio');
                    audio.autoplay = true; audio.playsInline = true;
                    audio.srcObject = e.streams[0];
                    audioContainer.appendChild(audio);
                    peers[peerId].audioEl = audio;
                    const src = audioCtx.createMediaStreamSource(e.streams[0]);
                    src.connect(rxAnalyser);
                }
            };
            if (isInitiator) {
                const offer = await pc.createOffer();
                offer.sdp = setAudioBitrate(offer.sdp, AUDIO_BITRATE);
                await pc.setLocalDescription(offer);
                ws.send(JSON.stringify({ type: "offer", to: peerId, offer: pc.localDescription }));
            }
        }

        function setAudioBitrate(sdp, bitrate) {
            return sdp.replace(/a=fmtp:111(.*)\r\n/g, 'a=fmtp:111$1;maxaveragebitrate=' + (bitrate * 1000) + '\r\n');
        }

        function updatePeerCount(count) { 
            peerCountEl.innerText = `USUÁRIOS CONECTADOS: ${count}`; 
        }

        function startPTT(e) {
            if (e && e.pointerId) pttBtn.setPointerCapture(e.pointerId);
            if (pttPressed || isTransmitting || rxCount > 0) return;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            pttPressed = true; isTransmitting = true;
            localStream.getAudioTracks()[0].enabled = true;
            pttBtn.classList.add('active');
            pttHint.innerText = "TRANSMITINDO...";
            statusEl.innerText = "Transmitindo";
            displayWrapper.classList.add('status-tx');
            ws.send(JSON.stringify({ type: "start_tx" }));
        }

        function stopPTT(e) {
            if (e && e.pointerId && pttBtn.hasPointerCapture(e.pointerId)) pttBtn.releasePointerCapture(e.pointerId);
            if (!pttPressed || !isTransmitting) return;
            pttPressed = false; isTransmitting = false;
            localStream.getAudioTracks()[0].enabled = false;
            pttBtn.classList.remove('active');
            pttHint.innerText = "Pressione e fale";
            statusEl.innerText = "Canal Livre";
            displayWrapper.classList.remove('status-tx');
            ws.send(JSON.stringify({ type: "stop_tx" }));
        }

        pttBtn.addEventListener('pointerdown', startPTT);
        pttBtn.addEventListener('pointerup', stopPTT);
        pttBtn.addEventListener('pointercancel', stopPTT);
        pttBtn.addEventListener('pointerleave', stopPTT);
        window.addEventListener('pointerup', stopPTT);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'F7') { e.preventDefault(); if (!isF7Pressed) { isF7Pressed = true; startPTT(); } }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'F7') { e.preventDefault(); isF7Pressed = false; stopPTT(); }
        });

        function handleRemoteTX(isStart, senderId) {
            if (isStart) {
                rxCount++;
                generateSubtone(SUBTONE_START_FREQ, 50);
                statusEl.innerText = "Recebendo";
                displayWrapper.classList.add('status-rx');
                pttBtn.classList.add('receiving');
                pttHint.innerText = "OCUPADO";
            } else {
                rxCount = Math.max(0, rxCount - 1);
                generateSubtone(SUBTONE_END_FREQ, 100);
                if (rxCount === 0) {
                    statusEl.innerText = "Canal Livre";
                    displayWrapper.classList.remove('status-rx');
                    pttBtn.classList.remove('receiving');
                    pttHint.innerText = "Pressione e fale";
                }
            }
        }

        function generateSubtone(freq, ms) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime); 
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + (ms / 1000));
        }

        function startVUMeter() {
            const data = new Uint8Array(256);
            function draw() {
                requestAnimationFrame(draw);
                const active = isTransmitting ? txAnalyser : (rxCount > 0 ? rxAnalyser : null);
                if (active) active.getByteFrequencyData(data);
                
                let sum = 0;
                for(let i = 0; i < 40; i++) sum += data[i];
                let avg = active ? sum / 40 : 0;
                
                ctxVU.clearRect(0, 0, canvasVU.width, canvasVU.height);
                let w = (avg / 255) * canvasVU.width;
                
                let gradient = ctxVU.createLinearGradient(0, 0, canvasVU.width, 0);
                gradient.addColorStop(0, '#2ecc71');
                gradient.addColorStop(0.6, '#f1c40f');
                gradient.addColorStop(1, '#e74c3c');
                
                ctxVU.fillStyle = gradient;
                ctxVU.fillRect(0, 0, w, canvasVU.height);
                
                ctxVU.fillStyle = 'rgba(0,0,0,0.4)';
                for(let i = 0; i < canvasVU.width; i += 8) {
                    ctxVU.fillRect(i, 0, 2, canvasVU.height);
                }
            }
            draw();
        }
    </script>
</body>
</html>
