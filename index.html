<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Link Talk</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  text-align:center;
}

.app {
  padding:20px;
}

.status {
  padding:6px 12px;
  border-radius:6px;
  display:inline-block;
  margin-bottom:10px;
}

.connected { background:green; }
.disconnected { background:red; }
.tx { background:#1e90ff; }
.busy { background:orange; }

#vu {
  width:250px;
  height:20px;
  background:#222;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

#vu-bar {
  height:100%;
  width:0%;
  background:#00ff88;
}

#ptt {
  width:200px;
  height:200px;
  border-radius:50%;
  border:none;
  font-size:18px;
  background:#1e90ff;
  color:white;

  /* 🔥 CORREÇÃO MOBILE */
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  touch-action: none;
}

#ptt:active {
  background:#0b5ed7;
}
</style>
</head>

<body>

<div class="app">

<h1>Z-Link Talk</h1>

<div id="status" class="status disconnected">Conectando...</div>

<br><br>

<input id="name" placeholder="Seu nome">

<div id="vu">
  <div id="vu-bar"></div>
</div>

<button id="ptt">SEGURE PARA FALAR</button>

<p>Ou pressione F7</p>

</div>

<script>
const ws = new WebSocket("wss://z-link-talk.onrender.com");

let mediaRecorder;
let isTalking = false;
let stream;

const statusEl = document.getElementById("status");
const vuBar = document.getElementById("vu-bar");
const ptt = document.getElementById("ptt");

// 🔊 desbloqueia áudio (OBRIGATÓRIO)
document.body.addEventListener("click", () => {
  new Audio().play().catch(()=>{});
});

// conexão
ws.onopen = () => {
  statusEl.innerText = "Canal livre";
  statusEl.className = "status connected";
};

ws.onclose = () => {
  statusEl.innerText = "Desconectado";
  statusEl.className = "status disconnected";
};

// microfone
navigator.mediaDevices.getUserMedia({ audio: true })
.then(s => {
  stream = s;

  mediaRecorder = new MediaRecorder(stream, {
    mimeType: "audio/webm"
  });

  mediaRecorder.ondataavailable = e => {
    if (isTalking && e.data.size > 0) {
      ws.send(e.data);
    }
  };
})
.catch(err => {
  alert("Erro microfone: " + err);
});

// 🔘 PTT (MOUSE)
ptt.addEventListener("mousedown", () => {
  ws.send(JSON.stringify({type:"request"}));
});

ptt.addEventListener("mouseup", stop);

// 🔘 PTT (CELULAR)
ptt.addEventListener("touchstart", (e) => {
  e.preventDefault();
  ws.send(JSON.stringify({type:"request"}));
});

ptt.addEventListener("touchend", (e) => {
  e.preventDefault();
  stop();
});

// teclado
document.addEventListener("keydown", e => {
  if (e.key === "F7") {
    ws.send(JSON.stringify({type:"request"}));
  }
});

document.addEventListener("keyup", e => {
  if (e.key === "F7") stop();
});

// parar transmissão
function stop() {
  if (mediaRecorder && mediaRecorder.state === "recording") {
    mediaRecorder.stop();
  }

  isTalking = false;
  ws.send(JSON.stringify({type:"release"}));
  vuBar.style.width = "0%";
}

// receber dados
ws.onmessage = async (msg) => {

  if (typeof msg.data === "string") {

    const data = JSON.parse(msg.data);

    if (data.type === "granted") {
      isTalking = true;
      mediaRecorder.start(200);

      statusEl.innerText = "Transmitindo...";
      statusEl.className = "status tx";

      startVU();
    }

    if (data.type === "busy") {
      statusEl.innerText = "Canal ocupado";
      statusEl.className = "status busy";
    }

    if (data.type === "free") {
      statusEl.innerText = "Canal livre";
      statusEl.className = "status connected";
    }

  } else {
    try {
      const blob = new Blob([msg.data], { type: "audio/webm" });
      const url = URL.createObjectURL(blob);

      const audio = new Audio(url);
      audio.play().catch(err => console.log(err));

    } catch (e) {
      console.log("Erro áudio:", e);
    }
  }
};

// VU
function startVU() {
  const ctx = new AudioContext();
  const analyser = ctx.createAnalyser();
  const source = ctx.createMediaStreamSource(stream);
  source.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function loop() {
    if (!isTalking) return;

    analyser.getByteFrequencyData(data);
    let vol = data.reduce((a,b)=>a+b)/data.length;

    vuBar.style.width = vol + "%";

    requestAnimationFrame(loop);
  }

  loop();
}
</script>

</body>
</html>
