<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Link Talk</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  text-align:center;
}

.app-container {
  padding:20px;
}

h1 {
  margin-bottom:5px;
}

.subtitle {
  color:#aaa;
  margin-bottom:20px;
}

.status {
  padding:6px 12px;
  border-radius:6px;
  font-weight:bold;
}

.connected { background:#0a8f2a; }
.disconnected { background:#a00; }
.tx { background:#1e90ff; }
.busy { background:#ff9900; }

.channel-control {
  display:flex;
  justify-content:center;
  align-items:center;
  margin:20px 0;
}

.ch-btn {
  padding:8px 12px;
  font-size:16px;
}

.channel-display {
  margin:0 20px;
}

#vu-container {
  width:250px;
  height:20px;
  background:#222;
  border-radius:10px;
  margin:20px auto;
  overflow:hidden;
}

#vu-bar {
  height:100%;
  width:0%;
  background:#00ff88;
  transition:width 0.1s;
}

.ptt-container {
  margin-top:30px;
}

#ptt-btn {
  width:220px;
  height:220px;
  border-radius:50%;
  border:none;
  font-size:20px;
  background:#2f8cff;
  color:#fff;
}

#ptt-btn:active {
  background:#1a5fbf;
}

input {
  padding:10px;
  width:200px;
  margin-top:10px;
  text-align:center;
}

.instructions {
  margin-top:20px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="app-container">

<h1>Z-Link Talk</h1>
<p class="subtitle">Desenvolvido por Diniz-RF</p>

<div>
  <span id="status" class="status disconnected">Conectando...</span>
</div>

<br>

<input id="username" placeholder="Seu nome">

<div class="channel-control">
  <button class="ch-btn">CH -</button>

  <div class="channel-display">
    <h2>CH 1</h2>
    <p>• Canal único</p>
  </div>

  <button class="ch-btn">CH +</button>
</div>

<div id="vu-container">
  <div id="vu-bar"></div>
</div>

<div class="ptt-container">
  <button id="ptt-btn">SEGURE PARA FALAR</button>
</div>

<div class="instructions">
  Pressione e segure ou tecla <strong>F7</strong>
</div>

</div>

<script>
const ws = new WebSocket("wss://z-link-talk.onrender.com");

let mediaRecorder;
let isTalking = false;
let audioUnlocked = false;

const statusEl = document.getElementById("status");
const ptt = document.getElementById("ptt-btn");
const vuBar = document.getElementById("vu-bar");

// desbloquear áudio
document.body.addEventListener("click", () => {
  if (!audioUnlocked) {
    const a = new Audio();
    a.play().catch(()=>{});
    audioUnlocked = true;
  }
});

// conexão
ws.onopen = () => {
  statusEl.innerText = "Canal livre";
  statusEl.className = "status connected";
};

ws.onclose = () => {
  statusEl.innerText = "Desconectado";
  statusEl.className = "status disconnected";
};

// microfone + VU (só TX)
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {

  const ctx = new AudioContext();
  const analyser = ctx.createAnalyser();
  const source = ctx.createMediaStreamSource(stream);
  source.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function drawVU() {
    if (isTalking) {
      analyser.getByteFrequencyData(data);
      let vol = data.reduce((a,b)=>a+b)/data.length;
      vuBar.style.width = vol + "%";
    } else {
      vuBar.style.width = "0%";
    }
    requestAnimationFrame(drawVU);
  }
  drawVU();

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    if (isTalking && e.data.size > 0) {
      ws.send(e.data);
    }
  };
});

// PTT
ptt.onmousedown = () => {
  ws.send(JSON.stringify({type:"request"}));
};

ptt.onmouseup = stopTalking;

document.addEventListener("keydown", e => {
  if (e.key === "F7") {
    ws.send(JSON.stringify({type:"request"}));
  }
});

document.addEventListener("keyup", e => {
  if (e.key === "F7") stopTalking();
});

function stopTalking() {
  isTalking = false;
  ws.send(JSON.stringify({type:"release"}));
  statusEl.innerText = "Canal livre";
  statusEl.className = "status connected";
}

// receber áudio
ws.onmessage = async (msg) => {

  if (typeof msg.data === "string") {
    const data = JSON.parse(msg.data);

    if (data.type === "granted") {
      isTalking = true;
      mediaRecorder.start(200);
      statusEl.innerText = "Transmitindo...";
      statusEl.className = "status tx";
    }

    if (data.type === "busy") {
      statusEl.innerText = "Canal ocupado";
      statusEl.className = "status busy";
    }

    if (data.type === "free") {
      statusEl.innerText = "Canal livre";
      statusEl.className = "status connected";
    }

  } else {
    try {
      const audio = new Audio(URL.createObjectURL(msg.data));
      await audio.play();
    } catch (e) {
      console.log("Erro áudio:", e);
    }
  }
};
</script>

</body>
</html>
