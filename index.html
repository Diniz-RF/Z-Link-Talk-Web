<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Link Talk</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  text-align:center;
  -webkit-user-select:none;
  user-select:none;
}

.app { padding:20px; }

h1 { margin-bottom:10px; }

.status {
  padding:6px 12px;
  border-radius:6px;
  display:inline-block;
  margin-bottom:10px;
  background:green;
}

#vu {
  width:250px;
  height:20px;
  background:#222;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

#vu-bar {
  height:100%;
  width:0%;
  background:#00ff88;
}

#ptt {
  width:220px;
  height:220px;
  border-radius:50%;
  border:none;
  font-size:20px;
  background:#1e90ff;
  color:white;
}

#ptt:active {
  background:#0b5ed7;
}
</style>
</head>

<body>

<div class="app">

<h1>Z-Link Talk</h1>

<div id="status" class="status">Conectando...</div>

<div id="vu">
  <div id="vu-bar"></div>
</div>

<button id="ptt">SEGURE PARA FALAR</button>

<p>Ou pressione F7</p>

</div>

<script>
const ws = new WebSocket("wss://z-link-talk.onrender.com");

let pc = new RTCPeerConnection();
let localStream;
let analyser;
let keyPressed = false;

const statusEl = document.getElementById("status");
const ptt = document.getElementById("ptt");
const vuBar = document.getElementById("vu-bar");

// 🔊 desbloqueia áudio
document.body.addEventListener("click", () => {
  new Audio().play().catch(()=>{});
});

// 🎙️ captura microfone
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
  localStream = stream;

  // começa MUTADO
  stream.getAudioTracks().forEach(t => t.enabled = false);

  // VU meter
  const ctx = new AudioContext();
  analyser = ctx.createAnalyser();
  const source = ctx.createMediaStreamSource(stream);
  source.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function loop(){
    analyser.getByteFrequencyData(data);
    let vol = data.reduce((a,b)=>a+b)/data.length;

    vuBar.style.width = (vol/2) + "%";

    requestAnimationFrame(loop);
  }
  loop();

  // adiciona ao WebRTC
  stream.getTracks().forEach(track => {
    pc.addTrack(track, stream);
  });
});

// 🔊 RECEBER áudio
pc.ontrack = e => {
  const audio = new Audio();
  audio.srcObject = e.streams[0];
  audio.play();
};

// ICE
pc.onicecandidate = e => {
  if (e.candidate) {
    ws.send(JSON.stringify({ type: "ice", candidate: e.candidate }));
  }
};

// conexão
ws.onopen = async () => {
  statusEl.innerText = "Conectado";

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  ws.send(JSON.stringify({ type: "offer", offer }));
};

// mensagens
ws.onmessage = async msg => {
  const data = JSON.parse(msg.data);

  if (data.type === "offer") {
    await pc.setRemoteDescription(data.offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    ws.send(JSON.stringify({ type: "answer", answer }));
  }

  if (data.type === "answer") {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.type === "ice") {
    try {
      await pc.addIceCandidate(data.candidate);
    } catch {}
  }
};

// 🎙️ controle PTT
function talk(on){
  if (!localStream) return;

  localStream.getAudioTracks().forEach(t => t.enabled = on);

  statusEl.innerText = on ? "Transmitindo..." : "Escutando";
}

// mouse
ptt.onmousedown = () => talk(true);
ptt.onmouseup = () => talk(false);

// touch
ptt.addEventListener("touchstart", e => {
  e.preventDefault();
  talk(true);
});

ptt.addEventListener("touchend", e => {
  e.preventDefault();
  talk(false);
});

// teclado F7
document.addEventListener("keydown", e => {
  if (e.key === "F7" && !keyPressed) {
    keyPressed = true;
    talk(true);
  }
});

document.addEventListener("keyup", e => {
  if (e.key === "F7") {
    keyPressed = false;
    talk(false);
  }
});
</script>

</body>
</html>
