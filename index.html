<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Link Talk ROIP</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  text-align:center;
  -webkit-user-select:none;
  user-select:none;
}

.app { padding:20px; }

#ptt {
  width:220px;
  height:220px;
  border-radius:50%;
  border:none;
  font-size:20px;
  background:#1e90ff;
  color:white;
}

#status {
  margin:10px;
}
</style>
</head>

<body>

<div class="app">

<h1>Z-Link ROIP</h1>

<div id="status">Conectando...</div>

<button id="ptt">SEGURE PARA FALAR</button>

</div>

<script>
const ws = new WebSocket("wss://z-link-talk.onrender.com");

let pc = new RTCPeerConnection();
let localStream;
let isTalking = false;

const statusEl = document.getElementById("status");
const ptt = document.getElementById("ptt");

// obter microfone
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
  localStream = stream;

  stream.getTracks().forEach(track => {
    pc.addTrack(track, stream);
  });
});

// receber áudio
pc.ontrack = event => {
  const audio = new Audio();
  audio.srcObject = event.streams[0];
  audio.play();
};

// ICE
pc.onicecandidate = event => {
  if (event.candidate) {
    ws.send(JSON.stringify({ type: "ice", candidate: event.candidate }));
  }
};

// websocket
ws.onopen = async () => {
  statusEl.innerText = "Conectado";

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  ws.send(JSON.stringify({ type: "offer", offer }));
};

ws.onmessage = async (msg) => {
  const data = JSON.parse(msg.data);

  if (data.type === "offer") {
    await pc.setRemoteDescription(data.offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    ws.send(JSON.stringify({ type: "answer", answer }));
  }

  if (data.type === "answer") {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.type === "ice") {
    try {
      await pc.addIceCandidate(data.candidate);
    } catch {}
  }
};

// PTT (mute/unmute)
ptt.addEventListener("mousedown", () => {
  toggleMic(true);
});

ptt.addEventListener("mouseup", () => {
  toggleMic(false);
});

ptt.addEventListener("touchstart", e => {
  e.preventDefault();
  toggleMic(true);
});

ptt.addEventListener("touchend", e => {
  e.preventDefault();
  toggleMic(false);
});

function toggleMic(on) {
  if (!localStream) return;

  localStream.getAudioTracks().forEach(track => {
    track.enabled = on;
  });

  statusEl.innerText = on ? "Transmitindo..." : "Escutando";
}
</script>

</body>
</html>
