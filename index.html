<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Link Talk</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  text-align:center;
  -webkit-user-select:none;
  user-select:none;
}

.app { padding:20px; }

.status {
  padding:6px 12px;
  border-radius:6px;
  display:inline-block;
  margin-bottom:10px;
  background:green;
}

#vu {
  width:250px;
  height:20px;
  background:#222;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

#vu-bar {
  height:100%;
  width:0%;
  background:#00ff88;
}

#ptt {
  width:220px;
  height:220px;
  border-radius:50%;
  border:none;
  font-size:20px;
  background:#1e90ff;
  color:white;
}
</style>
</head>

<body>

<div class="app">

<h1>Z-Link Talk</h1>

<div id="status" class="status">Conectado</div>

<div id="vu">
  <div id="vu-bar"></div>
</div>

<button id="ptt">SEGURE PARA FALAR</button>

<p>Ou pressione F7</p>

</div>

<script>
// WebRTC
const pc = new RTCPeerConnection({
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});

const ws = new WebSocket("wss://z-link-talk.onrender.com");

let localStream;
let keyPressed = false;

const statusEl = document.getElementById("status");

// CONTEXTO
const audioCtx = new AudioContext();

// subtom RX
function playTone(freq, durationMs) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.2;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + durationMs / 1000);
}

// desbloquear áudio
document.body.addEventListener("click", () => {
  audioCtx.resume();
});

// microfone
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
  localStream = stream;
  stream.getAudioTracks().forEach(t => t.enabled = false);

  stream.getTracks().forEach(track => {
    pc.addTrack(track, stream);
  });
});

// RECEBER ÁUDIO
pc.ontrack = e => {
  const remoteStream = e.streams[0];

  const audio = new Audio();
  audio.srcObject = remoteStream;
  audio.play();

  // ANALISADOR
  const ctx = new AudioContext();
  const analyser = ctx.createAnalyser();
  const source = ctx.createMediaStreamSource(remoteStream);
  source.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  let receiving = false;
  let lastActive = 0;

  function detect() {
    analyser.getByteFrequencyData(data);

    let volume = data.reduce((a,b)=>a+b)/data.length;

    if (volume > 12) {
      lastActive = Date.now();

      if (!receiving) {
        receiving = true;

        // 🔊 início RX
        playTone(18500, 50);

        statusEl.innerText = "Recebendo...";
      }

    } else {
      if (receiving && Date.now() - lastActive > 250) {
        receiving = false;

        // 🔊 fim RX
        playTone(17500, 100);

        statusEl.innerText = "Escutando";
      }
    }

    requestAnimationFrame(detect);
  }

  detect();
};

// ICE
pc.onicecandidate = e => {
  if (e.candidate) {
    ws.send(JSON.stringify({ type: "ice", candidate: e.candidate }));
  }
};

// conexão
ws.onopen = async () => {
  statusEl.innerText = "Conectado";

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  ws.send(JSON.stringify({ type: "offer", offer }));
};

// mensagens
ws.onmessage = async msg => {
  const data = JSON.parse(msg.data);

  if (data.type === "offer") {
    await pc.setRemoteDescription(data.offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    ws.send(JSON.stringify({ type: "answer", answer }));
  }

  if (data.type === "answer") {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.type === "ice") {
    try { await pc.addIceCandidate(data.candidate); } catch {}
  }
};

// PTT
function talk(on){
  if (!localStream) return;

  localStream.getAudioTracks().forEach(t => t.enabled = on);

  statusEl.innerText = on ? "Transmitindo..." : "Escutando";
}

// mouse
ptt.onmousedown = () => talk(true);
ptt.onmouseup = () => talk(false);

// touch
ptt.addEventListener("touchstart", e => {
  e.preventDefault();
  talk(true);
});

ptt.addEventListener("touchend", e => {
  e.preventDefault();
  talk(false);
});

// teclado
document.addEventListener("keydown", e => {
  if (e.key === "F7" && !keyPressed) {
    keyPressed = true;
    talk(true);
  }
});

document.addEventListener("keyup", e => {
  if (e.key === "F7") {
    keyPressed = false;
    talk(false);
  }
});
</script>

</body>
</html>
