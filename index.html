<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Link Talk</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  text-align:center;
}

.app {
  padding:20px;
}

.status {
  padding:8px 14px;
  border-radius:6px;
  display:inline-block;
  margin-bottom:15px;
  background:green;
  font-weight:bold;
}

#vu {
  width:260px;
  height:20px;
  background:#222;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

#vu-bar {
  height:100%;
  width:0%;
  background:#00ff88;
  transition:width 0.05s;
}

#ptt {
  width:220px;
  height:220px;
  border-radius:50%;
  border:none;
  font-size:20px;
  background:#1e90ff;
  color:white;
}

#ptt:active {
  background:#0b5ed7;
}
</style>
</head>

<body>

<div class="app">

<h1>Z-Link Talk</h1>

<div id="status" class="status">Conectando...</div>

<div id="vu">
  <div id="vu-bar"></div>
</div>

<button id="ptt">SEGURE PARA FALAR</button>

<p>Ou pressione F7</p>

<audio id="remoteAudio" autoplay playsinline></audio>

</div>

<script>
// =====================
// CONFIG
// =====================
const ws = new WebSocket("wss://z-link-talk.onrender.com");

const pc = new RTCPeerConnection({
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});

const statusEl = document.getElementById("status");
const vuBar = document.getElementById("vu-bar");
const remoteAudio = document.getElementById("remoteAudio");
const ptt = document.getElementById("ptt");

let localStream;
let keyPressed = false;

// =====================
// AUDIO CONTEXT
// =====================
const audioCtx = new AudioContext();

function playTone(freq, durationMs) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.2;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + durationMs / 1000);
}

// desbloqueio áudio
document.body.addEventListener("click", () => {
  audioCtx.resume();
  remoteAudio.play().catch(()=>{});
});

// =====================
// MICROFONE + VU TX
// =====================
navigator.mediaDevices.getUserMedia({
  audio: {
    channelCount: 1,
    sampleRate: 16000
  }
}).then(stream => {

  localStream = stream;

  // começa mutado
  stream.getAudioTracks().forEach(t => t.enabled = false);

  // VU TX
  const analyser = audioCtx.createAnalyser();
  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function vuTX(){
    analyser.getByteFrequencyData(data);
    let vol = data.reduce((a,b)=>a+b)/data.length;

    if (isTransmitting) {
      vuBar.style.width = (vol/2) + "%";
    }

    requestAnimationFrame(vuTX);
  }

  vuTX();

  // adiciona track
  stream.getTracks().forEach(track => pc.addTrack(track, stream));

  // limitar bitrate (~32kbps)
  const sender = pc.getSenders().find(s => s.track && s.track.kind === "audio");
  if (sender) {
    const params = sender.getParameters();
    if (!params.encodings) params.encodings = [{}];
    params.encodings[0].maxBitrate = 32000;
    sender.setParameters(params);
  }

}).catch(err => alert(err));

// =====================
// RECEBER ÁUDIO + VU RX
// =====================
pc.ontrack = (event) => {
  const stream = event.streams[0];
  remoteAudio.srcObject = stream;

  // VU RX
  const analyser = audioCtx.createAnalyser();
  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function vuRX(){
    analyser.getByteFrequencyData(data);
    let vol = data.reduce((a,b)=>a+b)/data.length;

    if (!isTransmitting) {
      vuBar.style.width = (vol/2) + "%";
    }

    requestAnimationFrame(vuRX);
  }

  vuRX();
};

// =====================
// ICE
// =====================
pc.onicecandidate = e => {
  if (e.candidate) {
    ws.send(JSON.stringify({ type:"ice", candidate:e.candidate }));
  }
};

// =====================
// CONEXÃO
// =====================
ws.onopen = async () => {
  statusEl.innerText = "Conectado";

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  ws.send(JSON.stringify({ type:"offer", offer }));
};

// =====================
// MENSAGENS
// =====================
ws.onmessage = async msg => {
  const data = JSON.parse(msg.data);

  if (data.type === "offer") {
    await pc.setRemoteDescription(data.offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    ws.send(JSON.stringify({ type:"answer", answer }));
  }

  if (data.type === "answer") {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.type === "ice") {
    try { await pc.addIceCandidate(data.candidate); } catch {}
  }

  // controle RX
  if (data.type === "start_tx") {
    playTone(18500, 50);
    statusEl.innerText = "Recebendo...";
  }

  if (data.type === "stop_tx") {
    playTone(17500, 100);
    statusEl.innerText = "Escutando";
  }
};

// =====================
// PTT
// =====================
let isTransmitting = false;

function talk(on){
  if (!localStream) return;

  isTransmitting = on;

  localStream.getAudioTracks().forEach(t => t.enabled = on);

  if (on) {
    ws.send(JSON.stringify({ type:"start_tx" }));
    statusEl.innerText = "Transmitindo...";
  } else {
    ws.send(JSON.stringify({ type:"stop_tx" }));
    statusEl.innerText = "Escutando";
  }
}

// botão
ptt.onmousedown = () => talk(true);
ptt.onmouseup = () => talk(false);

// touch
ptt.addEventListener("touchstart", e => {
  e.preventDefault();
  talk(true);
});

ptt.addEventListener("touchend", e => {
  e.preventDefault();
  talk(false);
});

// teclado
document.addEventListener("keydown", e => {
  if (e.key === "F7" && !keyPressed) {
    keyPressed = true;
    talk(true);
  }
});

document.addEventListener("keyup", e => {
  if (e.key === "F7") {
    keyPressed = false;
    talk(false);
  }
});
</script>

</body>
</html>
