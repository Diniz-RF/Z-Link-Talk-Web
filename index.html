<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-Link Talk | Diniz-RF</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --radio-body: #1a1d23;
            --display-bg: #000000;
            --text-main: #e0e6ed;
            --text-dim: #6c757d;
            --accent-blue: #007bff;
            --accent-green: #28a745;
            --accent-red: #dc3545;
            --ptt-idle: #2c3e50;
        }

        /* 1. CORREÇÃO GLOBAL: Remove o highlight de toque em todo o app */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* Impede seleção de texto acidental no corpo do app */
            user-select: none;
            -webkit-user-select: none;
        }

        #app-screen {
            width: 90%;
            max-width: 380px;
            background-color: var(--radio-body);
            border-radius: 40px;
            padding: 30px 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.05);
            border: 1px solid #2a2e35;
            text-align: center;
            position: relative;
        }

        .header {
            margin-bottom: 25px;
        }

        h1 {
            font-size: 26px;
            margin: 0;
            letter-spacing: 1px;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
        }

        .dev-tag {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
            display: block;
        }

        .display-panel {
            background-color: var(--display-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            border: 2px solid #222;
            box-shadow: inset 0 0 10px rgba(0,0,0,1);
        }

        #status {
            font-size: 14px;
            font-weight: bold;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-tx { color: var(--accent-red) !important; text-shadow: 0 0 8px rgba(220, 53, 69, 0.5); }
        .status-rx { color: var(--accent-green) !important; text-shadow: 0 0 8px rgba(40, 167, 69, 0.5); }

        canvas#vu-meter {
            width: 100%;
            height: 12px;
            border-radius: 4px;
            background-color: #111;
        }

        .ptt-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        /* 2. CORREÇÃO NO BOTÃO: Remove efeitos de sistema no Android */
        #ptt-btn {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            border: 8px solid #121417;
            background: radial-gradient(circle, #34495e 0%, #2c3e50 100%);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 2px 10px rgba(255,255,255,0.1);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            
            /* Propriedades de correção visual */
            outline: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            
            position: relative;
        }

        /* 3. CORREÇÃO INTERNA: Impede que o texto interfira no toque ou seja selecionado */
        #ptt-btn span, #ptt-btn strong {
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #ptt-btn::after {
            content: "";
            position: absolute;
            width: 90%;
            height: 90%;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
        }

        #ptt-btn span {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 8px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        #ptt-btn.active {
            transform: scale(0.96);
            background: radial-gradient(circle, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.4), inset 0 5px 15px rgba(0,0,0,0.3);
            border-color: #96281b;
        }

        #ptt-btn.receiving {
            background: radial-gradient(circle, #2ecc71 0%, #27ae60 100%);
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4);
            border-color: #1e8449;
            pointer-events: none;
        }

        #peer-count {
            margin-top: 25px;
            font-size: 11px;
            color: var(--text-dim);
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        #audio-container { display: none; }
    </style>
</head>
<body>

    <div id="app-screen">
        <div class="header">
            <h1>Z-Link Talk</h1>
            <span class="dev-tag">Desenvolvido por Diniz-RF</span>
        </div>

        <div class="display-panel">
            <div id="status">Aguardando Mic...</div>
            <canvas id="vu-meter" width="300" height="12"></canvas>
        </div>
        
        <div class="ptt-container">
            <button id="ptt-btn">
                <strong>SEGURE PARA FALAR</strong>
                <span>OU PRESSIONE F7</span>
            </button>
        </div>

        <div id="peer-count">USUÁRIOS ONLINE: 1</div>
        <div id="audio-container"></div>
    </div>

    <script>
        // --- LÓGICA MANTIDA CONFORME ESPECIFICAÇÕES ANTERIORES ---
        const WS_URL = "wss://z-link-talk.onrender.com";
        const AUDIO_BITRATE = 32;
        const SUBTONE_START_FREQ = 18500;
        const SUBTONE_END_FREQ = 17500;
        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        const pttBtn = document.getElementById('ptt-btn');
        const statusEl = document.getElementById('status');
        const canvasVU = document.getElementById('vu-meter');
        const ctxVU = canvasVU.getContext('2d');
        const peerCountEl = document.getElementById('peer-count');
        const audioContainer = document.getElementById('audio-container');

        let ws, myId = null, localStream, audioCtx, txAnalyser, rxAnalyser;
        let peers = {}, isTransmitting = false, pttPressed = false, rxCount = 0;

        window.addEventListener('load', async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1 }
                });
                localStream.getAudioTracks()[0].enabled = false;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                txAnalyser = audioCtx.createAnalyser();
                rxAnalyser = audioCtx.createAnalyser();
                txAnalyser.fftSize = 256;
                rxAnalyser.fftSize = 256;
                const source = audioCtx.createMediaStreamSource(localStream);
                source.connect(txAnalyser);
                startVUMeter();
                connectWebSocket();
            } catch (err) {
                statusEl.innerText = "ERRO DE PERMISSÃO";
                statusEl.classList.add('status-tx');
            }
        });

        function connectWebSocket() {
            statusEl.innerText = "CONECTANDO...";
            ws = new WebSocket(WS_URL);
            ws.onopen = () => { statusEl.innerText = "ESCUTANDO"; statusEl.className = ""; };
            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                const senderId = data.from || data.id;
                switch (data.type) {
                    case "init":
                        myId = data.id;
                        data.clients.forEach(clientId => { if (clientId !== myId) createPeerConnection(clientId, true); });
                        updatePeerCount(data.clients.length);
                        break;
                    case "new_peer":
                        updatePeerCount(Object.keys(peers).length + 2);
                        break;
                    case "offer":
                        if (!peers[senderId]) await createPeerConnection(senderId, false);
                        await peers[senderId].pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                        const answer = await peers[senderId].pc.createAnswer();
                        answer.sdp = setAudioBitrate(answer.sdp, AUDIO_BITRATE);
                        await peers[senderId].pc.setLocalDescription(answer);
                        ws.send(JSON.stringify({ type: "answer", to: senderId, answer: peers[senderId].pc.localDescription }));
                        break;
                    case "answer":
                        if (peers[senderId]) await peers[senderId].pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                        break;
                    case "ice_candidate":
                        if (peers[senderId]) await peers[senderId].pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                        break;
                    case "start_tx": handleRemoteTX(true, senderId); break;
                    case "stop_tx": handleRemoteTX(false, senderId); break;
                    case "peer_left":
                        if (peers[data.id]) {
                            if (peers[data.id].audioEl) peers[data.id].audioEl.remove();
                            peers[data.id].pc.close();
                            delete peers[data.id];
                        }
                        updatePeerCount(Object.keys(peers).length + 1);
                        break;
                }
            };
            ws.onclose = () => { statusEl.innerText = "DESCONECTADO"; setTimeout(connectWebSocket, 3000); };
        }

        async function createPeerConnection(peerId, isInitiator) {
            const pc = new RTCPeerConnection(rtcConfig);
            peers[peerId] = { pc, audioEl: null };
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            pc.onicecandidate = (e) => { if (e.candidate) ws.send(JSON.stringify({ type: "ice_candidate", to: peerId, candidate: e.candidate })); };
            pc.ontrack = (e) => {
                if (!peers[peerId].audioEl) {
                    const audio = document.createElement('audio');
                    audio.autoplay = true; audio.playsInline = true;
                    audio.srcObject = e.streams[0];
                    audioContainer.appendChild(audio);
                    peers[peerId].audioEl = audio;
                    const src = audioCtx.createMediaStreamSource(e.streams[0]);
                    src.connect(rxAnalyser);
                }
            };
            if (isInitiator) {
                const offer = await pc.createOffer();
                offer.sdp = setAudioBitrate(offer.sdp, AUDIO_BITRATE);
                await pc.setLocalDescription(offer);
                ws.send(JSON.stringify({ type: "offer", to: peerId, offer: pc.localDescription }));
            }
        }

        function setAudioBitrate(sdp, bitrate) {
            return sdp.replace(/a=fmtp:111(.*)\r\n/g, 'a=fmtp:111$1;maxaveragebitrate=' + (bitrate * 1000) + '\r\n');
        }

        function updatePeerCount(count) { peerCountEl.innerText = `USUÁRIOS ONLINE: ${count}`; }

        function startPTT(e) {
            if (e && e.pointerId) pttBtn.setPointerCapture(e.pointerId);
            if (pttPressed || isTransmitting || rxCount > 0) return;
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            pttPressed = true; isTransmitting = true;
            localStream.getAudioTracks()[0].enabled = true;
            pttBtn.classList.add('active');
            pttBtn.querySelector('strong').innerText = "FALANDO...";
            pttBtn.querySelector('span').innerText = "SOLTE PARA OUVIR";
            statusEl.innerText = "TRANSMITINDO";
            statusEl.className = "status-tx";
            ws.send(JSON.stringify({ type: "start_tx" }));
        }

        function stopPTT(e) {
            if (e && e.pointerId && pttBtn.hasPointerCapture(e.pointerId)) pttBtn.releasePointerCapture(e.pointerId);
            if (!pttPressed || !isTransmitting) return;
            pttPressed = false; isTransmitting = false;
            localStream.getAudioTracks()[0].enabled = false;
            pttBtn.classList.remove('active');
            pttBtn.querySelector('strong').innerText = "SEGURE PARA FALAR";
            pttBtn.querySelector('span').innerText = "OU PRESSIONE F7";
            statusEl.innerText = "ESCUTANDO";
            statusEl.className = "";
            ws.send(JSON.stringify({ type: "stop_tx" }));
        }

        pttBtn.addEventListener('pointerdown', startPTT);
        pttBtn.addEventListener('pointerup', stopPTT);
        pttBtn.addEventListener('pointercancel', stopPTT);
        pttBtn.addEventListener('pointerleave', stopPTT);
        window.addEventListener('pointerup', stopPTT);

        window.addEventListener('keydown', (e) => { if (e.key === 'F7' && !e.repeat) { e.preventDefault(); startPTT(); } });
        window.addEventListener('keyup', (e) => { if (e.key === 'F7') { e.preventDefault(); stopPTT(); } });

        function handleRemoteTX(isStart, senderId) {
            if (isStart) {
                rxCount++;
                generateSubtone(SUBTONE_START_FREQ, 50);
                statusEl.innerText = "RECEBENDO";
                statusEl.className = "status-rx";
                pttBtn.classList.add('receiving');
                pttBtn.querySelector('strong').innerText = "OCUPADO";
                pttBtn.querySelector('span').innerText = "RECEBENDO ÁUDIO";
            } else {
                rxCount = Math.max(0, rxCount - 1);
                generateSubtone(SUBTONE_END_FREQ, 100);
                if (rxCount === 0) {
                    statusEl.innerText = "ESCUTANDO";
                    statusEl.className = "";
                    pttBtn.classList.remove('receiving');
                    pttBtn.querySelector('strong').innerText = "SEGURE PARA FALAR";
                    pttBtn.querySelector('span').innerText = "OU PRESSIONE F7";
                }
            }
        }

        function generateSubtone(freq, ms) {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime); 
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + (ms / 1000));
        }

        function startVUMeter() {
            const data = new Uint8Array(256);
            function draw() {
                requestAnimationFrame(draw);
                const active = isTransmitting ? txAnalyser : rxAnalyser;
                active.getByteFrequencyData(data);
                let sum = 0;
                for(let i = 0; i < 40; i++) sum += data[i];
                let avg = sum / 40;
                ctxVU.clearRect(0, 0, canvasVU.width, canvasVU.height);
                let w = (avg / 255) * canvasVU.width;
                if (!isTransmitting && rxCount === 0) w = 0;
                
                let gradient = ctxVU.createLinearGradient(0, 0, canvasVU.width, 0);
                gradient.addColorStop(0, '#28a745');
                gradient.addColorStop(0.6, '#ffc107');
                gradient.addColorStop(1, '#dc3545');
                
                ctxVU.fillStyle = gradient;
                ctxVU.fillRect(0, 0, w, canvasVU.height);
                
                ctxVU.fillStyle = 'rgba(0,0,0,0.5)';
                for(let i = 0; i < canvasVU.width; i += 10) ctxVU.fillRect(i, 0, 2, canvasVU.height);
            }
            draw();
        }
    </script>
</body>
</html>
