<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Link Talk</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  text-align:center;
}

.app { padding:20px; }

.status {
  padding:8px;
  background:green;
  margin-bottom:15px;
  display:inline-block;
}

#vu {
  width:250px;
  height:20px;
  background:#222;
  margin:20px auto;
  border-radius:10px;
}

#vu-bar {
  height:100%;
  width:0%;
  background:#00ff88;
}

#ptt {
  width:200px;
  height:200px;
  border-radius:50%;
  background:#1e90ff;
  border:none;
  color:#fff;
  font-size:18px;
}
</style>
</head>

<body>

<div class="app">

<h1>Z-Link Talk</h1>

<div id="status" class="status">Conectando...</div>

<div id="vu"><div id="vu-bar"></div></div>

<button id="ptt">SEGURE PARA FALAR</button>

<p>Ou F7</p>

<audio id="remoteAudio" autoplay></audio>

</div>

<script>
const ws = new WebSocket("wss://z-link-talk.onrender.com");

let peers = {};
let localStream;
let myId;
let keyPressed = false;

const statusEl = document.getElementById("status");
const vuBar = document.getElementById("vu-bar");
const ptt = document.getElementById("ptt");

const audioCtx = new AudioContext();

function playTone(freq, duration){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.2;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + duration/1000);
}

// microfone
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
  localStream = stream;
  stream.getAudioTracks()[0].enabled = false;
});

// criar conexão
function createPeer(id){
  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.ontrack = e=>{
    const audio = new Audio();
    audio.srcObject = e.streams[0];
    audio.play();
  };

  pc.onicecandidate = e=>{
    if(e.candidate){
      ws.send(JSON.stringify({
        type:"ice",
        to:id,
        candidate:e.candidate
      }));
    }
  };

  peers[id]=pc;
  return pc;
}

// mensagens
ws.onmessage = async msg=>{
  const data = JSON.parse(msg.data);

  if(data.type==="init"){
    myId = data.id;
    statusEl.innerText="Conectado";

    data.clients.forEach(id=>{
      if(id!==myId){
        const pc=createPeer(id);
        const offer=await pc.createOffer();
        await pc.setLocalDescription(offer);

        ws.send(JSON.stringify({
          type:"offer",
          to:id,
          offer
        }));
      }
    });
  }

  if(data.type==="new_peer"){
    const pc=createPeer(data.id);

    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);

    ws.send(JSON.stringify({
      type:"offer",
      to:data.id,
      offer
    }));
  }

  if(data.type==="offer"){
    const pc=createPeer(data.from);

    await pc.setRemoteDescription(data.offer);

    const answer=await pc.createAnswer();
    await pc.setLocalDescription(answer);

    ws.send(JSON.stringify({
      type:"answer",
      to:data.from,
      answer
    }));
  }

  if(data.type==="answer"){
    await peers[data.from].setRemoteDescription(data.answer);
  }

  if(data.type==="ice"){
    try{
      await peers[data.from].addIceCandidate(data.candidate);
    }catch{}
  }

  if(data.type==="start_tx"){
    playTone(18500,50);
    statusEl.innerText="Recebendo...";
  }

  if(data.type==="stop_tx"){
    playTone(17500,100);
    statusEl.innerText="Escutando";
  }
};

// PTT
function talk(on){
  localStream.getAudioTracks()[0].enabled=on;

  if(on){
    ws.send(JSON.stringify({type:"start_tx"}));
    statusEl.innerText="Transmitindo...";
  }else{
    ws.send(JSON.stringify({type:"stop_tx"}));
    statusEl.innerText="Escutando";
  }
}

ptt.onmousedown=()=>talk(true);
ptt.onmouseup=()=>talk(false);

document.addEventListener("keydown",e=>{
  if(e.key==="F7"&&!keyPressed){
    keyPressed=true;
    talk(true);
  }
});

document.addEventListener("keyup",e=>{
  if(e.key==="F7"){
    keyPressed=false;
    talk(false);
  }
});
</script>

</body>
</html>
