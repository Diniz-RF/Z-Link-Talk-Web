<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Z-Link Talk</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:#fff;
  text-align:center;
  -webkit-user-select:none;
  user-select:none;
}

.app { padding:20px; }

.status {
  padding:6px 12px;
  border-radius:6px;
  display:inline-block;
  margin-bottom:10px;
  background:green;
}

#vu {
  width:250px;
  height:20px;
  background:#222;
  margin:20px auto;
  border-radius:10px;
  overflow:hidden;
}

#vu-bar {
  height:100%;
  width:0%;
  background:#00ff88;
}

#ptt {
  width:220px;
  height:220px;
  border-radius:50%;
  border:none;
  font-size:20px;
  background:#1e90ff;
  color:white;
}

#ptt:active {
  background:#0b5ed7;
}
</style>
</head>

<body>

<div class="app">

<h1>Z-Link Talk</h1>

<div id="status" class="status">Conectando...</div>

<div id="vu">
  <div id="vu-bar"></div>
</div>

<button id="ptt">SEGURE PARA FALAR</button>

<p>Ou pressione F7</p>

</div>

<script>
// ======================
// CONFIG WEBRTC
// ======================
const pc = new RTCPeerConnection({
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});

const ws = new WebSocket("wss://z-link-talk.onrender.com");

let localStream;
let analyser;
let keyPressed = false;

const statusEl = document.getElementById("status");
const vuBar = document.getElementById("vu-bar");
const ptt = document.getElementById("ptt");

// ======================
// ÁUDIO (SUBTOM)
// ======================
const audioCtx = new AudioContext();

function playTone(freq, durationMs) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.frequency.value = freq;
  gain.gain.value = 0.2;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + durationMs / 1000);
}

// desbloqueio
document.body.addEventListener("click", () => {
  audioCtx.resume();
});

// ======================
// MICROFONE + VU
// ======================
navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
  localStream = stream;

  // inicia mutado
  stream.getAudioTracks().forEach(t => t.enabled = false);

  // VU meter
  const ctx = new AudioContext();
  analyser = ctx.createAnalyser();
  const source = ctx.createMediaStreamSource(stream);
  source.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function loop(){
    analyser.getByteFrequencyData(data);
    let vol = data.reduce((a,b)=>a+b)/data.length;
    vuBar.style.width = (vol/2) + "%";
    requestAnimationFrame(loop);
  }
  loop();

  // adiciona ao WebRTC
  stream.getTracks().forEach(track => {
    pc.addTrack(track, stream);
  });
});

// ======================
// RECEBER ÁUDIO
// ======================
pc.ontrack = e => {
  const audio = new Audio();
  audio.srcObject = e.streams[0];
  audio.play();
};

// ======================
// ICE
// ======================
pc.onicecandidate = e => {
  if (e.candidate) {
    ws.send(JSON.stringify({ type: "ice", candidate: e.candidate }));
  }
};

// ======================
// CONEXÃO
// ======================
ws.onopen = async () => {
  statusEl.innerText = "Conectado";

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  ws.send(JSON.stringify({ type: "offer", offer }));
};

// ======================
// MENSAGENS
// ======================
ws.onmessage = async msg => {
  const data = JSON.parse(msg.data);

  // WebRTC
  if (data.type === "offer") {
    await pc.setRemoteDescription(data.offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    ws.send(JSON.stringify({ type: "answer", answer }));
  }

  if (data.type === "answer") {
    await pc.setRemoteDescription(data.answer);
  }

  if (data.type === "ice") {
    try { await pc.addIceCandidate(data.candidate); } catch {}
  }

  // ======================
  // CONTROLE DE TX (SEM VAD)
  // ======================
  if (data.type === "start_tx") {
    playTone(18500, 50);
    statusEl.innerText = "Recebendo...";
  }

  if (data.type === "stop_tx") {
    playTone(17500, 100);
    statusEl.innerText = "Escutando";
  }
};

// ======================
// PTT
// ======================
function talk(on){
  if (!localStream) return;

  localStream.getAudioTracks().forEach(t => t.enabled = on);

  if (on) {
    ws.send(JSON.stringify({ type: "start_tx" }));
    statusEl.innerText = "Transmitindo...";
  } else {
    ws.send(JSON.stringify({ type: "stop_tx" }));
    statusEl.innerText = "Escutando";
  }
}

// ======================
// CONTROLES
// ======================

// mouse
ptt.addEventListener("mousedown", () => talk(true));
ptt.addEventListener("mouseup", () => talk(false));

// touch
ptt.addEventListener("touchstart", e => {
  e.preventDefault();
  talk(true);
});

ptt.addEventListener("touchend", e => {
  e.preventDefault();
  talk(false);
});

// teclado
document.addEventListener("keydown", e => {
  if (e.key === "F7" && !keyPressed) {
    keyPressed = true;
    talk(true);
  }
});

document.addEventListener("keyup", e => {
  if (e.key === "F7") {
    keyPressed = false;
    talk(false);
  }
});
</script>

</body>
</html>
